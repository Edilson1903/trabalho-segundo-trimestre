<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymFit - Calculadora de IMC Independente</title>
    <style>
        /* --- ESTILOS INTERFACE DARK (PRETO/CIANO) --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121212;
            /* Fundo geral preto fosco */
            color: #e0e0e0;
            /* Texto claro para contraste */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Painel centralizado onde fica a calculadora */
        .container {
            background-color: #1e1e1e;
            /* Cinza escuro */
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            border: 1px solid #2d2d2d;
        }

        h2 {
            color: #ffffff;
            margin-bottom: 25px;
            font-size: 24px;
            text-align: center;
            border-bottom: 2px solid #2d2d2d;
            padding-bottom: 10px;
        }

        /* Grupos de espaçamento dos campos de texto */
        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #b3b3b3;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            background-color: #2a2a2a;
            /* Caixa de texto cinza ligeiramente mais clara */
            border: 1px solid #3a3a3a;
            border-radius: 6px;
            color: #ffffff;
            font-size: 15px;
            transition: border-color 0.3s ease;
        }

        /* Efeito visual de foco ao clicar no campo para digitar */
        input:focus {
            outline: none;
            border-color: #00adb5;
            /* Borda acende em ciano */
        }

        /* Botão de envio principal */
        button.action-btn {
            width: 100%;
            padding: 14px;
            background-color: #00adb5;
            /* Botão Ciano */
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
        }

        button.action-btn:hover {
            background-color: #008f95;
            /* Escurece no hover */
        }

        button.action-btn:active {
            transform: scale(0.98);
            /* Efeito de clique físico */
        }

        /* Caixa de exibição do resultado (fica oculta por padrão) */
        .result-container {
            margin-top: 25px;
            padding: 15px;
            background-color: #252525;
            border-radius: 6px;
            border-left: 4px solid #00adb5;
            display: none;
        }

        .result-title {
            font-size: 14px;
            color: #888888;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .result-value {
            font-size: 28px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 5px;
        }

        .result-class {
            font-size: 16px;
            font-weight: 500;
        }

        /* Classes semafóricas para alteração de cor dinâmica via JavaScript */
        .normal {
            color: #00e676;
        }

        /* Verde */
        .alerta {
            color: #ffd600;
        }

        /* Amarelo */
        .perigo {
            color: #ff1744;
        }

        /* Vermelho */
    </style>
</head>

<body>

    <div class="container">
        <h2>Calculadora de IMC</h2>

        <div class="input-group">
            <label for="peso">Peso (kg):</label>
            <input type="number" id="peso" step="0.1" placeholder="Ex: 70.5">
        </div>

        <div class="input-group">
            <label for="altura">Altura (m):</label>
            <input type="number" id="altura" step="0.01" placeholder="Ex: 1.75">
        </div>

        <button class="action-btn" onclick="processarIMCLocal()">Calcular IMC</button>

        <div id="resultado-imc-box" class="result-container">
            <div class="result-title">Resultado (Salvo no Navegador):</div>
            <div id="imc-num" class="result-value">--</div>
            <div id="imc-class" class="result-class">--</div>
        </div>
    </div>

    <script>
        function processarIMCLocal() {
            // Captura e converte os valores digitados nos inputs para números decimais
            const peso = parseFloat(document.getElementById('peso').value);
            const altura = parseFloat(document.getElementById('altura').value);

            // Validação simples para conferir se os campos não estão em branco ou zerados
            if (!peso || !altura || peso <= 0 || altura <= 0) {
                alert("Por favor, insira valores numéricos válidos para peso e altura.");
                return;
            }

            // Aplica a fórmula matemática do IMC: peso / (altura * altura)
            const imc = peso / (altura * altura);

            // Inicializa as variáveis de texto e cor que vão mudar dinamicamente
            let classificacao = "";
            let classeCss = "";

            // Estrutura condicional para classificar a faixa de peso baseada na OMS
            if (imc < 18.5) {
                classificacao = "Abaixo do peso";
                classeCss = "alerta"; // Cor amarela
            } else if (imc >= 18.5 && imc < 25) {
                classificacao = "Peso normal (parabéns!)";
                classeCss = "normal"; // Cor verde
            } else if (imc >= 25 && imc < 30) {
                classificacao = "Sobrepeso";
                classeCss = "alerta"; // Cor amarela
            } else if (imc >= 30 && imc < 35) {
                classificacao = "Obesidade Grau 1";
                classeCss = "perigo"; // Cor vermelha
            } else if (imc >= 35 && imc < 40) {
                classificacao = "Obesidade Grau 2";
                classeCss = "perigo"; // Cor vermelha
            } else {
                classificacao = "Obesidade Grau 3 (mórbida)";
                classeCss = "perigo"; // Cor vermelha
            }

            // Cria um objeto com os dados calculados para guardar no armazenamento local
            const dadosIMC = {
                peso: peso,
                altura: altura,
                imc: imc.toFixed(2), // Limita o valor em duas casas decimais
                classificacao: classificacao
            };

            // CORRIGIDO: Removido o caractere '#' que causava erro de sintaxe.
            // O navegador salva esse histórico internamente em formato de texto (JSON)
            localStorage.setItem('historico_imc', JSON.stringify(dadosIMC));

            // Atualiza o número do IMC na interface gráfica
            document.getElementById('imc-num').innerText = imc.toFixed(2);

            // Captura o elemento do texto classificatório
            const txtClassificacao = document.getElementById('imc-class');
            txtClassificacao.innerText = classificacao;

            // Altera a classe CSS para mudar a cor do texto dependendo da faixa de peso
            txtClassificacao.className = "result-class " + classeCss;

            // Modifica a propriedade display para tornar visível a caixa de resultado
            document.getElementById('resultado-imc-box').style.display = 'block';
        }
    </script>
</body>

</html>
